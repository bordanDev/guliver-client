<div class="flex h-screen overflow-hidden surface-ground">
  <!-- Fixed Sidebar Static Menu -->
  <aside
    class="flex-shrink-0 w-18rem surface-card border-right-1 surface-border flex flex-column shadow-2 z-2"
  >
    <div
      class="flex align-items-center justify-content-between h-4rem border-bottom-1 surface-border px-3"
    >
      <!-- <i class="pi pi-bolt text-primary text-2xl mr-2"></i> -->
      <span class="text-xl font-bold">Dashboard</span>

      <img src="assets/logo.svg" alt="" />
    </div>
    <div class="flex-1 overflow-y-auto px-1">
      <!-- Использование p-menu обеспечивает статичный (не схлопывающийся) список с лейблами секций -->
      <p-menu [model]="menuItems" styleClass="w-full border-none"></p-menu>
    </div>
  </aside>

  <!-- Main Content Area -->
  <main class="flex-1 flex flex-column overflow-hidden relative z-1">
    <!-- Topbar -->
    <p-toolbar
      styleClass="border-none border-bottom-1 surface-border border-noround px-4 h-4rem surface-card shadow-1"
    >
      <ng-template pTemplate="start">
        <span class="text-600 font-medium">Control Center</span>
      </ng-template>
      <ng-template pTemplate="end">
        <div class="flex align-items-center gap-4">
          <i
            class="pi pi-bell text-secondary text-xl cursor-pointer hover:text-primary transition-colors"
          ></i>
          <div
            class="w-2rem h-2rem border-circle surface-300 flex align-items-center justify-content-center text-sm font-bold text-700 cursor-pointer hover:surface-200 transition-colors"
          >
            AD
          </div>
        </div>
      </ng-template>
    </p-toolbar>

    <!-- Content Router Outlet -->
    <div class="flex-1 overflow-y-auto p-4 z-0 relative">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
